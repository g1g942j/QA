spring.datasource.url=jdbc:postgresql://localhost:5432/recipe_book
spring.datasource.username=postgres
spring.datasource.password=pos
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# CORS: если пусто — разрешены все origins (удобно для статики на любом порту и file://).
# В продакшене задать, например: recipebook.cors.allowed-origin-patterns=https://example.com

# Загрузка фото блюд (multipart)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Публичный базовый URL для ссылок на фото в JSON (совпадает с тем, как фронт ходит к API).
recipebook.public-base-url=http://localhost:8080
# Файлы на диске (относительно рабочей директории процесса)
recipebook.storage.dish-photos-dir=uploads/dish-photos
recipebook.storage.product-photos-dir=uploads/product-photos

# Модель фото блюд: коллекция URL (dish_photos) заменена на dish_stored_photo.
# Фото продуктов: product_photos (ElementCollection) заменена на product_stored_photo.
# Hibernate ddl-auto=update может не удалить старые коллекционные таблицы — дроп таблиц или чистая БД для dev.

